<!DOCTYPE html>
<html>
<head>
    <title>Form with All Input Types</title>
</head>
<body>
    <h2>Complete HTML Form</h2>
    <form>

        <label>Text: </label>
        <input type="text" name="text" placeholder="Enter Name"><br><br>

        <label>Password:</label>
        <input type="password" name="password"><br><br>

 
        <label>Email:</label>
        <input type="email" name="email"><br><br>

        <label>Number:</label>
        <input type="number" name="number"><br><br>

        <label>Date:</label>
        <input type="date" name="date"><br><br>

  
        <label>Time:</label>
        <input type="time" name="time"><br><br>

       
        <label>Color:</label>
        <input type="color" name="color"><br><br>

       
        <label>File:</label>
        <input type="file" name="file"><br><br>

        <label>Checkbox:</label>
        <input type="checkbox" name="checkbox"><br><br>

        
        <label>Radio:</label>
        <input type="radio" name="radio" value="1"> Option 1
        <input type="radio" name="radio" value="2"> Option 2<br><br>

       
        <label>Range:</label>
        <input type="range" name="range" min="0" max="100"><br><br>

       
        <label>URL:</label>
        <input type="url" name="url"><br><br>

        
        <label>Phone:</label>
        <input type="tel" name="phone"><br><br>

        <label>Search:</label>
        <input type="search" name="search"><br><br>

        <input type="submit" value="Submit">

    </form>
</body>
</html>
