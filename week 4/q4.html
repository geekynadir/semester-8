<!DOCTYPE html>
<html>
<head>
  <title>Two Rows & Two Columns</title>
  <style>
    body, html {
      height: 100%;
      margin: 0px;
    }
    .row {
      height: 50%;
      display: flex;
    }
    .top {
      background-color: lightblue;
      width: 100%;
    }
    .bottom {
      width: 100%;
    }
    .left {
      background-color: lightgreen;
      width: 50%;
    }
    .right {
      background-color: lightcoral;
      width: 50%;
    }
  </style>
</head>
<body>

  <div class="row top"> </div>
  <div class="row bottom">
    <div class="left"></div>
    <div class="right"></div>
  </div>

</body>
</html>
