<!DOCTYPE html>
<html>
<head>
    <title>Table Layout</title>
    <style>
        table {
            border-collapse: collapse;
            width: 500px;
            text-align: center;
        }
        td {
            border: 1px solid gray;
            padding: 10px;
        }
    </style>
</head>
<body>

<table>
    <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
        <td>4</td>
    </tr>
    <tr>
        <td>5</td>
        <td colspan="2" rowspan="2">Image</td>
        <td>6</td>
    </tr>
    <tr>
        <td>7</td>
       
        <td>8</td>
    </tr>
    <tr>
        <td>9</td>
        <td>10</td>
        <td>11</td>
        <td>12</td>
    </tr>
</table>

</body>
</html>
